name: XenonBrain Continuous Evolution & Dashboard

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  train_and_deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 🧬 Accessing Xenon Core
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: 🐍 Preparing Neural Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: 📦 Installing Sovereign Dependencies (V6.5)
      run: |
        python -m pip install --upgrade pip
        pip install torch numpy pandas requests feedparser yfinance sentence-transformers matplotlib pyyaml tqdm scikit-learn
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: 🧠 Executing Deep Logic Training (V6.5 Sovereign Intelligence)
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/src
        python src/training/train.py
      env:
        PYTHONPATH: src

    - name: 📧 Sending Daily Intelligence Report (V6.5)
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/src
        python src/utils/email_notifier.py
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        PYTHONPATH: src
        
    - name: 🚀 Committing Evolution & Deploying Dashboard
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "XenonBrain Core"
        # التأكد من إضافة كافة ملفات V6.5 المحدثة
        git add models/xenon_brain_latest.pth DAILY_REPORT.md HISTORY.json docs/ README.md src/ config/
        git pull origin main --rebase --autostash
        git commit -m "🧠 Evolution V6.5: Sovereign Intelligence, Reddit Integration & Historical Reconciliation [$(date +'%Y-%m-%d')]" || echo "No changes"
        git push origin main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 🌐 Uploading Dashboard Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './docs'

  deploy_pages:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: train_and_deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
