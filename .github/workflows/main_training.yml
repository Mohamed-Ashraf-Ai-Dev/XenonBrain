name: XenonBrain Continuous Training

on:
  schedule:
    # سيتم تشغيل التدريب تلقائيًا كل يوم في منتصف الليل (بتوقيت UTC)
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch: # يسمح بتشغيل التدريب يدويًا من واجهة GitHub

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Data Collection & Training
      run: |
        python src/training/train.py

    - name: Commit and Push Updated Model, Report & Memory
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # إضافة ملف النموذج، التقرير اليومي، وملف الذاكرة التاريخية
        git add models/xenon_brain_latest.pth DAILY_REPORT.md HISTORY.json
        git commit -m "Auto-update XenonBrain Evolution V3: Model, Report & Memory [$(date)]" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
