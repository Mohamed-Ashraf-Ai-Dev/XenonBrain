name: XenonBrain Continuous Evolution
on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch: 
jobs:
  train:
    runs-on: ubuntu-latest
    steps:
    - name: 🧬 Accessing Xenon Core
      uses: actions/checkout@v3
      
    - name: 🐍 Preparing Neural Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 📦 Loading Synaptic Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 🧠 Executing Deep Logic Training
      run: |
        python src/training/train.py
        
    - name: 🚀 Committing Evolution to XenonBrain
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "XenonBrain Core"
        git add models/xenon_brain_latest.pth DAILY_REPORT.md HISTORY.json
        
        # رسايل متغيرة وشيك بتعبر عن التطور
        COMMIT_MSG="🧠 XenonBrain Evolution: System intelligence updated with latest global patterns [$(date +'%Y-%m-%d')]"
        
        git commit -m "$COMMIT_MSG" || echo "No evolution detected today."
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
