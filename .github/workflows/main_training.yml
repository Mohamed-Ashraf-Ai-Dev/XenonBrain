name: XenonBrain Continuous Evolution & Dashboard

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  train_and_deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 🧬 Accessing Xenon Core
      uses: actions/checkout@v3
      
    - name: 🐍 Preparing Neural Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 📦 Loading Synaptic Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 🧠 Executing Deep Logic Training
      run: |
        python src/training/train.py
        
    - name: 🔔 Checking Logic Shifts
      run: |
        python src/utils/notifier.py
        if [ -f ALERT.txt ]; then
          gh issue create --title "🚨 XenonBrain: Logic Shift Detected" --body-file ALERT.txt
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 🚀 Committing Evolution & Deploying Dashboard
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "XenonBrain Core"
        git add models/xenon_brain_latest.pth DAILY_REPORT.md HISTORY.json docs/
        git commit -m "🧠 Evolution: Global Intelligence & Dashboard updated [$(date +'%Y-%m-%d')]" || echo "No changes"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 🌐 Deploying Dashboard to GitHub Pages
      uses: actions/upload-pages-artifact@v2
      with:
        path: './docs'

  deploy_pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: train_and_deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3
